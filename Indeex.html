<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="POS Pro">
<link rel="manifest" href="manifest.json">
<title>POS Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f1117;--s1:#1a1d27;--s2:#22263a;--bd:#2e3347;
  --tl:#00c9a7;--tl-d:#00c9a715;
  --or:#ff8c42;--or-d:#ff8c4215;
  --gr:#4ade80;--gr-d:#4ade8015;
  --rd:#f87171;--rd-d:#f8717115;
  --bl:#60a5fa;--bl-d:#60a5fa15;
  --yw:#fbbf24;--yw-d:#fbbf2412;
  --tx:#e8eaf0;--dm:#6b7280;--mt:#9ca3af;
  --in:#13161f;--lk:#1c2030;
  --r:12px;--rs:8px;
  --nav:56px;--tab:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:"DM Sans",sans-serif;font-size:14px;display:flex;flex-direction:column;}

/* TOPBAR */
#topbar{background:var(--s1);border-bottom:1px solid var(--bd);height:var(--nav);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;padding-top:env(safe-area-inset-top);}
.brand{font-family:"Syne",sans-serif;font-size:18px;font-weight:800;color:var(--tl);}
#tb-title{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;flex:1;text-align:center;}
#tb-right{display:flex;gap:6px;}
.ib{background:none;border:none;color:var(--mt);font-size:18px;cursor:pointer;padding:7px;border-radius:8px;}
.ib:active{background:var(--s2);}

/* SAVE INDICATOR */
#save-ind{position:fixed;top:calc(var(--nav) + 6px);right:10px;background:var(--gr-d);border:1px solid var(--gr);color:var(--gr);border-radius:100px;padding:3px 10px;font-size:11px;font-family:"DM Mono",monospace;display:none;z-index:80;}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:14px;padding-bottom:80px;}
.page.on{display:block;}

/* BOTTOM NAV */
#bnav{height:var(--tab);background:var(--s1);border-top:1px solid var(--bd);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.bt-{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--dm);font-size:10px;font-weight:500;cursor:pointer;transition:color .15s;padding:6px 2px;}
.bt- .ic{font-size:20px;line-height:1;transition:transform .15s;}
.bt-.on{color:var(--tl);}
.bt-.on .ic{transform:scale(1.12);}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:13px;}
.ct{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;margin-bottom:11px;}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:13px;}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 10px;position:relative;overflow:hidden;text-align:center;}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.t::before{background:var(--tl);}.kpi.o::before{background:var(--or);}
.kpi.g::before{background:var(--gr);}.kpi.b::before{background:var(--bl);}.kpi.r::before{background:var(--rd);}
.kl{font-size:10px;color:var(--dm);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.kv{font-family:"DM Mono",monospace;font-size:14px;font-weight:500;}
.kpi.t .kv{color:var(--tl);}.kpi.o .kv{color:var(--or);}.kpi.g .kv{color:var(--gr);}.kpi.b .kv{color:var(--bl);}.kpi.r .kv{color:var(--rd);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:11px;color:var(--dm);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
.fg input,.fg select{background:var(--in);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:"DM Sans",sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border .15s;width:100%;-webkit-appearance:none;}
.fg input:focus,.fg select:focus{border-color:var(--tl);}
.fg input[readonly]{background:var(--lk);color:var(--mt);cursor:default;border-style:dashed;}
.fy{border-color:var(--yw)!important;background:var(--yw-d)!important;font-weight:700!important;}
.fgrid{display:grid;gap:10px;margin-bottom:12px;}

/* SEARCH INPUT */
.srch-wrap{position:relative;margin-bottom:10px;}
.srch-inp{width:100%;background:var(--in);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:14px;padding:10px 12px;outline:none;}
.srch-inp:focus{border-color:var(--tl);}
.srch-drop{display:none;position:absolute;top:100%;left:0;right:0;background:var(--s1);border:1px solid var(--tl);border-radius:var(--rs);max-height:220px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.srch-drop.on{display:block;}
.srch-item{padding:11px 13px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.srch-item:hover{background:var(--s2);}
.srch-item:last-child{border-bottom:none;}

/* BUTTONS */
.btn{border:none;border-radius:var(--rs);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn:active{transform:scale(.96);}
.btn-w{width:100%;justify-content:center;padding:13px;}
.bt{background:var(--tl);color:#0a0e16;}.bo{background:var(--or);color:#0a0e16;}.bg{background:var(--gr);color:#0a0e16;}
.br{background:var(--rd-d);color:var(--rd);border:1px solid var(--rd);}.bgh{background:var(--s2);color:var(--tx);border:1px solid var(--bd);}
.bbl{background:var(--bl-d);color:var(--bl);border:1px solid var(--bl);}
.scanbtn{background:var(--bl-d);border:1px solid var(--bl);border-radius:var(--rs);color:var(--bl);font-size:20px;padding:9px 13px;cursor:pointer;}

/* PANIER */
.pan-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bd);}
.pan-item:last-child{border-bottom:none;}
.pan-nm{flex:1;font-weight:600;font-size:13px;}
.pan-qty{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:14px;font-weight:700;width:55px;text-align:center;padding:5px 4px;font-family:"DM Mono",monospace;}
.pan-sub{font-family:"DM Mono",monospace;font-size:13px;font-weight:700;min-width:72px;text-align:right;}
.pan-tot{display:flex;justify-content:space-between;align-items:center;padding:11px 0 0;margin-top:6px;border-top:2px solid var(--bd);}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--bd);}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:var(--s2);}
thead th{padding:9px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--dm);font-weight:600;white-space:nowrap;}
tbody tr{border-top:1px solid var(--bd);}
tbody tr:hover{background:var(--s2);}
td{padding:8px 10px;vertical-align:middle;}
tfoot tr{background:var(--s2);}tfoot td{padding:9px 10px;font-weight:700;}

/* BADGES */
.bd{display:inline-block;padding:2px 7px;border-radius:100px;font-size:11px;font-weight:600;font-family:"DM Mono",monospace;}
.t-bd{background:var(--tl-d);color:var(--tl);}.o-bd{background:var(--or-d);color:var(--or);}.g-bd{background:var(--gr-d);color:var(--gr);}.r-bd{background:var(--rd-d);color:var(--rd);}.b-bd{background:var(--bl-d);color:var(--bl);}

/* MISC */
.mono{font-family:"DM Mono",monospace;}
.empty{text-align:center;padding:28px;color:var(--dm);font-size:13px;}
.stitle{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;margin:14px 0 9px;}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.del{background:none;border:none;color:var(--dm);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:5px;}
.del:active{background:var(--rd-d);color:var(--rd);}
.ebtn{background:none;border:1px solid var(--bd);border-radius:5px;color:var(--mt);cursor:pointer;font-size:11px;padding:3px 8px;}
.pbtn{background:none;border:1px solid;border-radius:5px;cursor:pointer;font-size:11px;padding:4px 9px;font-weight:600;}
.pbtn.g{border-color:var(--gr);color:var(--gr);}.pbtn.o{border-color:var(--or);color:var(--or);}
.divider{height:1px;background:var(--bd);margin:12px 0;}
.alert{border-radius:var(--rs);padding:8px 12px;font-size:13px;display:none;margin-bottom:10px;border:1px solid;}
.alert.ok{background:var(--gr-d);border-color:var(--gr);color:var(--gr);}
.alert.err{background:var(--rd-d);border-color:var(--rd);color:var(--rd);}
.alert.on{display:block;}

/* TOAST */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s1);border:1px solid var(--bd);border-left:3px solid var(--tl);border-radius:var(--rs);padding:10px 16px;font-size:13px;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;max-width:90vw;}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.err{border-left-color:var(--rd);}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.mbox{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.mbox.c{border-radius:var(--r);margin:auto;max-width:480px;}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.macts{display:flex;gap:8px;margin-top:13px;}
.dh{width:36px;height:4px;background:var(--bd);border-radius:100px;margin:0 auto 14px;}

/* RECU */
#recu{font-family:"DM Mono",monospace;font-size:11.5px;color:#000;background:#fff;padding:8px 7px;border-radius:5px;line-height:1.7;}
.rc{text-align:center;}.rb{font-weight:700;}.rbig{font-size:14px;font-weight:700;text-align:center;}
.rl{border-top:1px dashed #000;margin:5px 0;}.rrow{display:flex;justify-content:space-between;}
.rsm{font-size:10px;color:#555;text-align:center;}

/* PRINT */
@media print{body>*{display:none!important;}#pz{display:block!important;}#pza4{display:block!important;}}
#pz{display:none;font-family:"DM Mono",monospace;font-size:12px;width:58mm;color:#000;background:#fff;padding:4mm 3mm;line-height:1.7;}
#pz .rc{text-align:center;}#pz .rb{font-weight:700;}#pz .rbig{font-size:14px;font-weight:700;text-align:center;}
#pz .rl{border-top:1px dashed #000;margin:5px 0;}#pz .rrow{display:flex;justify-content:space-between;}#pz .rsm{font-size:10px;color:#555;text-align:center;}
#pza4{display:none;font-family:"DM Sans",sans-serif;font-size:12px;color:#000;background:#fff;padding:15mm 12mm;line-height:1.6;}
#pza4 h1{font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:3px;}
#pza4 table{width:100%;border-collapse:collapse;margin-top:12px;}
#pza4 th{background:#1a1a2e;color:#fff;padding:7px 9px;text-align:left;font-size:11px;}
#pza4 td{padding:6px 9px;border-bottom:1px solid #ddd;font-size:11px;}
#pza4 tr:nth-child(even) td{background:#f8f9fa;}
#pza4 .tr-tot{font-weight:700;background:#e8f4e8;}
#pza4 .warn{background:#fff3cd;border:1px solid #ffc107;border-radius:5px;padding:9px 12px;margin-top:12px;font-size:11px;}

/* CAMERA SCAN */
#scan-modal{display:none;position:fixed;inset:0;background:#000;z-index:1000;flex-direction:column;}
#scan-modal.on{display:flex;}
.scan-top{background:#111;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.scan-vid-wrap{flex:1;position:relative;overflow:hidden;}
#scan-video{width:100%;height:100%;object-fit:cover;}
.scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scan-box{position:relative;width:260px;height:150px;}
.scan-box::before{content:"";position:absolute;inset:0;border:2px solid rgba(0,201,167,.4);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.55);}
.scan-corner{position:absolute;width:26px;height:26px;border-color:#00c9a7;border-style:solid;}
.sc-tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:8px 0 0 0;}
.sc-tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 8px 0 0;}
.sc-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 8px;}
.sc-br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 8px 0;}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,#00c9a7,transparent);animation:sl 1.5s ease-in-out infinite;}
@keyframes sl{0%,100%{top:4px;}50%{top:calc(100% - 6px)}}
#scan-status{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:13px;padding:10px;text-align:center;}
.scan-bottom{background:#111;padding:12px 16px;display:flex;gap:8px;flex-shrink:0;}
#scan-manual{flex:1;background:#222;border:1px solid #444;border-radius:8px;color:#fff;padding:10px 12px;font-size:14px;outline:none;}

/* WALLET */
.wallet-big{font-family:"DM Mono",monospace;font-size:30px;font-weight:700;text-align:center;padding:10px 0 4px;}
.wallet-sub{font-size:11px;color:var(--dm);text-align:center;margin-bottom:12px;}
.dep-item{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--bd);}
.dep-item:last-child{border-bottom:none;}
.dep-ico{font-size:22px;width:32px;text-align:center;}
.dep-info{flex:1;min-width:0;}
.dep-nm{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dep-meta{font-size:11px;color:var(--dm);}
.dep-mt{font-family:"DM Mono",monospace;font-size:14px;font-weight:700;color:var(--rd);}

/* PROD LIST */
.prod-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);}
.prod-item:last-child{border-bottom:none;}
.prod-name{flex:1;font-weight:600;font-size:13px;}
.prod-meta{font-size:11px;color:var(--dm);}
.prod-stk{font-family:"DM Mono",monospace;font-size:13px;font-weight:700;}
.prod-stk.ok{color:var(--gr);}.prod-stk.low{color:var(--or);}.prod-stk.out{color:var(--rd);}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">⚡</div>
  <div id="tb-title">Dashboard</div>
  <div id="tb-right">
    <button class="ib" onclick="startScanFor('caisse')" title="Scanner">📷</button>
    <button class="ib" onclick="exportJSON()" title="Backup">💾</button>
  </div>
</div>
<div id="save-ind"></div>

<div id="content">

<div id="pg-dashboard" class="page on">
  <div class="date-flt card" style="padding:11px 13px;margin-bottom:13px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--dm);white-space:nowrap">📅</span>
    <input type="date" id="d-from" onchange="rDash()" style="flex:1;min-width:120px;background:var(--in);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px;padding:6px 9px;outline:none">
    <span style="color:var(--dm);font-size:12px">→</span>
    <input type="date" id="d-to" onchange="rDash()" style="flex:1;min-width:120px;background:var(--in);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-size:13px;padding:6px 9px;outline:none">
    <button class="btn bgh" style="padding:6px 10px;font-size:12px" onclick="resetDates()">Tout</button>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="card"><div class="ct">📈 CA par jour</div><div id="d-chart" style="min-height:80px"></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px">
    <div class="card"><div class="ct">🏆 Top 5</div><div id="d-top"></div></div>
    <div class="card"><div class="ct" style="color:var(--rd)">⚠️ Stock Bas</div><div id="d-stk"></div></div>
  </div>
  <div class="card"><div class="ct" style="color:var(--rd)">💳 Crédits Clients</div><div id="d-cr"></div></div>
  <div class="card"><div class="ct" style="color:var(--or)">📋 Dettes Fournisseurs</div><div id="d-de"></div></div>
</div>

<div id="pg-caisse" class="page">
  <div class="card">
    <div class="fgrid" style="grid-template-columns:1fr auto">
      <div class="fg"><label>Client</label>
        <select id="v-cl" onchange="document.getElementById('v-cid').value=this.value">
          <option value="">— Choisir —</option>
        </select>
      </div>
      <div class="fg" style="justify-content:flex-end">
        <label>Date</label>
        <input type="date" id="v-date" style="width:140px">
      </div>
    </div>
    <input type="text" id="v-cid" readonly placeholder="ID auto" style="background:var(--lk);color:var(--mt);border:1px dashed var(--bd);border-radius:var(--rs);padding:6px 10px;font-size:12px;width:100%;margin-top:6px;outline:none">
  </div>

  <div class="card">
    <div class="ct">➕ Ajouter Article</div>
    <div id="al-c" class="alert"></div>
    <div class="fg" style="margin-bottom:10px">
      <label>Produit <span style="color:var(--dm);font-size:10px;text-transform:none">— tapez ou scannez</span></label>
      <div style="display:flex;gap:6px">
        <div class="srch-wrap" style="flex:1;margin-bottom:0">
          <input type="text" id="vpr-s" class="srch-inp" placeholder="🔍 Nom du produit..." autocomplete="off"
            oninput="srch('vpr','vpr-s','vpr-d')" onfocus="srch('vpr','vpr-s','vpr-d')">
          <div id="vpr-d" class="srch-drop"></div>
        </div>
        <button class="scanbtn" onclick="startScanFor('caisse')">📷</button>
      </div>
      <input type="hidden" id="vpr">
    </div>
    <div class="fgrid" style="grid-template-columns:1fr 1fr">
      <div class="fg">
        <label>Prix (DT) <span id="v-pn" style="font-size:10px;font-weight:700"></span></label>
        <input type="number" id="v-px" step="0.001" placeholder="Auto" oninput="calcL()" class="fy">
        <small id="v-po" style="color:var(--dm);font-size:10px"></small>
      </div>
      <div class="fg"><label>Quantité</label><input type="number" id="v-qt" min="1" value="1" oninput="calcL()"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn bg" style="flex:1" onclick="addP()">➕ Ajouter au panier</button>
      <button class="btn bgh" id="v-rb" style="display:none;font-size:12px" onclick="rstPx()">↩ Catalogue</button>
    </div>
  </div>

  <div class="card" id="c-pan" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="ct" style="margin:0">🛒 Panier</div>
      <button class="del" onclick="vidP()" style="color:var(--rd)">🗑 Vider</button>
    </div>
    <div id="pan-items"></div>
    <div class="pan-tot">
      <span style="font-weight:700">TOTAL</span>
      <span id="pan-tot" style="font-family:'DM Mono',monospace;font-size:18px;color:var(--tl);font-weight:700">0.000 DT</span>
    </div>
    <div class="divider"></div>
    <div class="fg" style="margin-bottom:10px">
      <label>Mode de paiement</label>
      <select id="v-pay" onchange="tglVPay()">
        <option value="cash">💵 Cash complet</option>
        <option value="partial">💳 Paiement partiel</option>
        <option value="credit">📋 Tout en crédit</option>
      </select>
    </div>
    <div class="fg" id="v-pg" style="display:none;margin-bottom:10px">
      <label>Montant payé (DT)</label>
      <input type="number" id="v-paid" step="0.001" min="0" placeholder="0.000">
    </div>
